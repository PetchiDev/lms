services:
  postgres:
    image: postgres:16-alpine
    container_name: caretrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password@1
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - caretrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caretrack_pgdata:
