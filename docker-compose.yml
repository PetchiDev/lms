services:
  postgres:
    image: postgres:16-alpine
    container_name: caretrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password@1
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - caretrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: caretrack-azurite
    ports:
      - "10000:10000"
    volumes:
      - caretrack_azurite:/data
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --loose

volumes:
  caretrack_pgdata:
  caretrack_azurite:
